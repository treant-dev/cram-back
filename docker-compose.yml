services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: default
      POSTGRES_PASSWORD: default
      POSTGRES_DB: cram
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cram -d cramgo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
